<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Lab 2 — String Matching Algorithms</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; }

    header {
      background: #1e293b;
      border-bottom: 1px solid #334155;
      padding: 16px 32px;
      display: flex; align-items: center; gap: 12px;
    }
    header .badge { background: #8b5cf6; color: #fff; font-size: 12px; font-weight: 700; padding: 3px 10px; border-radius: 20px; }
    header h1 { font-size: 18px; font-weight: 600; color: #f1f5f9; }

    main { max-width: 860px; margin: 40px auto; padding: 0 20px; }

    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 28px;
      margin-bottom: 24px;
    }
    .card h2 { font-size: 15px; font-weight: 600; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 20px; }

    label { display: block; font-size: 13px; color: #94a3b8; margin-bottom: 6px; margin-top: 14px; }
    label:first-of-type { margin-top: 0; }
    input, textarea {
      width: 100%; padding: 10px 14px;
      background: #0f172a; border: 1px solid #334155; border-radius: 8px;
      color: #f1f5f9; font-size: 14px; outline: none; font-family: monospace;
      transition: border-color 0.2s;
    }
    input:focus, textarea:focus { border-color: #8b5cf6; }
    textarea { resize: vertical; min-height: 80px; }

    .btn-row { display: flex; gap: 10px; margin-top: 20px; flex-wrap: wrap; }
    button {
      padding: 10px 22px; border: none; border-radius: 8px;
      font-size: 14px; font-weight: 600; cursor: pointer; transition: opacity 0.2s;
    }
    button:hover { opacity: 0.85; }
    .btn-primary { background: #8b5cf6; color: #fff; }
    .btn-secondary { background: #334155; color: #cbd5e1; }

    .result-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; margin-top: 20px; }
    .result-box {
      background: #0f172a; border: 1px solid #334155; border-radius: 10px; padding: 18px;
    }
    .result-box .algo-name { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: #64748b; margin-bottom: 10px; }
    .result-box .stat { display: flex; justify-content: space-between; font-size: 13px; padding: 5px 0; border-bottom: 1px solid #1e293b; }
    .result-box .stat:last-child { border-bottom: none; }
    .result-box .stat span:last-child { color: #a78bfa; font-weight: 600; }

    .highlight-box {
      background: #0f172a; border: 1px solid #334155; border-radius: 10px;
      padding: 16px; margin-top: 16px; font-family: monospace; font-size: 13px;
      word-break: break-all; line-height: 1.8;
    }
    mark { background: #7c3aed; color: #fff; border-radius: 3px; padding: 1px 2px; }

    table { width: 100%; border-collapse: collapse; font-size: 13px; margin-top: 10px; }
    th { text-align: right; padding: 8px 12px; color: #64748b; font-weight: 600; font-size: 12px; text-transform: uppercase; border-bottom: 1px solid #334155; }
    th:first-child { text-align: left; }
    td { text-align: right; padding: 9px 12px; border-bottom: 1px solid #1e293b; color: #cbd5e1; }
    td:first-child { text-align: left; color: #94a3b8; font-family: monospace; }
    tr:last-child td { border-bottom: none; }

    .error-msg { color: #f87171; font-size: 13px; margin-top: 12px; }
    .loading { color: #64748b; font-size: 13px; margin-top: 12px; }
    #perf-section { display: none; }
  </style>
</head>
<body>

<header>
  <span class="badge">LAB 2</span>
  <h1>Naive · KMP · Rabin-Karp String Matching</h1>
</header>

<main>
  <div class="card">
    <h2>Run Pattern Search</h2>
    <label>Text</label>
    <textarea id="text-input">AABAACAADAABAABA</textarea>
    <label>Pattern</label>
    <input id="pattern-input" type="text" value="AABA"/>
    <div class="btn-row">
      <button class="btn-primary" onclick="runSearch()">Search</button>
      <button class="btn-secondary" onclick="runPerformance()">Run Performance Analysis</button>
    </div>
    <div id="error-msg" class="error-msg" style="display:none"></div>
  </div>

  <div id="result-section" class="card" style="display:none">
    <h2>Results</h2>
    <div class="result-grid">
      <div class="result-box">
        <div class="algo-name">Naive Search</div>
        <div class="stat"><span>Matches</span><span id="naive-matches"></span></div>
        <div class="stat"><span>Indices</span><span id="naive-indices"></span></div>
        <div class="stat"><span>Comparisons</span><span id="naive-comp"></span></div>
      </div>
      <div class="result-box">
        <div class="algo-name">KMP</div>
        <div class="stat"><span>Matches</span><span id="kmp-matches"></span></div>
        <div class="stat"><span>Indices</span><span id="kmp-indices"></span></div>
        <div class="stat"><span>Comparisons</span><span id="kmp-comp"></span></div>
      </div>
      <div class="result-box">
        <div class="algo-name">Rabin-Karp</div>
        <div class="stat"><span>Matches</span><span id="rk-matches"></span></div>
        <div class="stat"><span>Indices</span><span id="rk-indices"></span></div>
        <div class="stat"><span>Comparisons</span><span id="rk-comp"></span></div>
      </div>
    </div>
    <div class="highlight-box" id="highlight-display"></div>
  </div>

  <div id="perf-section" class="card">
    <h2>Performance Analysis (10,000-char random text)</h2>
    <div id="perf-loading" class="loading">Running analysis…</div>
    <table id="perf-table" style="display:none">
      <thead>
        <tr>
          <th>Pattern</th>
          <th>Naive</th>
          <th>KMP</th>
          <th>Rabin-Karp</th>
        </tr>
      </thead>
      <tbody id="perf-body"></tbody>
    </table>
  </div>
</main>

<script>
  async function runSearch() {
    const text = document.getElementById('text-input').value;
    const pattern = document.getElementById('pattern-input').value;
    const errEl = document.getElementById('error-msg');
    errEl.style.display = 'none';

    const res = await fetch('/search', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text, pattern })
    });
    const data = await res.json();
    if (data.error) { errEl.textContent = data.error; errEl.style.display = 'block'; return; }

    document.getElementById('naive-matches').textContent = data.naive.matches.length;
    document.getElementById('naive-indices').textContent = data.naive.matches.join(', ') || '—';
    document.getElementById('naive-comp').textContent = data.naive.comparisons;

    document.getElementById('kmp-matches').textContent = data.kmp.matches.length;
    document.getElementById('kmp-indices').textContent = data.kmp.matches.join(', ') || '—';
    document.getElementById('kmp-comp').textContent = data.kmp.comparisons;

    document.getElementById('rk-matches').textContent = data.rabin.matches.length;
    document.getElementById('rk-indices').textContent = data.rabin.matches.join(', ') || '—';
    document.getElementById('rk-comp').textContent = data.rabin.comparisons;

    // Highlight matches in text
    const positions = new Set(data.naive.matches);
    const pLen = data.pattern.length;
    let html = '';
    for (let i = 0; i < data.text.length; i++) {
      if (positions.has(i)) {
        html += '<mark>' + data.text.slice(i, i + pLen) + '</mark>';
        i += pLen - 1;
      } else {
        html += data.text[i];
      }
    }
    document.getElementById('highlight-display').innerHTML = html;
    document.getElementById('result-section').style.display = 'block';
  }

  async function runPerformance() {
    document.getElementById('perf-section').style.display = 'block';
    document.getElementById('perf-loading').style.display = 'block';
    document.getElementById('perf-table').style.display = 'none';

    const res = await fetch('/performance');
    const data = await res.json();

    const tbody = document.getElementById('perf-body');
    tbody.innerHTML = '';
    data.forEach(row => {
      tbody.innerHTML += `<tr>
        <td>${row.pattern}</td>
        <td>${row.naive.toLocaleString()}</td>
        <td>${row.kmp.toLocaleString()}</td>
        <td>${row.rabin.toLocaleString()}</td>
      </tr>`;
    });

    document.getElementById('perf-loading').style.display = 'none';
    document.getElementById('perf-table').style.display = 'table';
  }
</script>
</body>
</html>
