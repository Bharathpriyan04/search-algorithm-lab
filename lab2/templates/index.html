<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Lab 2 — String Matching</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Courier New', monospace; background: #0d1117; color: #c9d1d9; min-height: 100vh; padding: 40px 20px; }
    header { text-align: center; margin-bottom: 48px; }
    header h1 { font-size: 2.2rem; color: #58a6ff; letter-spacing: 2px; text-transform: uppercase; }
    header p { margin-top: 8px; color: #8b949e; font-size: 0.9rem; }
    .badge { display: inline-block; margin-top: 12px; padding: 4px 12px; background: #161b22; border: 1px solid #30363d; border-radius: 20px; font-size: 0.75rem; color: #3fb950; }
    .card { background: #161b22; border: 1px solid #30363d; border-radius: 10px; padding: 28px; max-width: 760px; margin: 0 auto 28px auto; }
    .card h2 { font-size: 1rem; color: #58a6ff; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 20px; border-bottom: 1px solid #21262d; padding-bottom: 10px; }
    label { display: block; font-size: 0.8rem; color: #8b949e; margin-bottom: 6px; letter-spacing: 0.5px; }
    input[type="text"] { width: 100%; padding: 10px 14px; background: #0d1117; border: 1px solid #30363d; border-radius: 6px; color: #c9d1d9; font-family: 'Courier New', monospace; font-size: 0.95rem; margin-bottom: 16px; outline: none; transition: border-color 0.2s; }
    input[type="text"]:focus { border-color: #58a6ff; }
    .btn { display: inline-block; padding: 10px 24px; border-radius: 6px; border: none; font-family: 'Courier New', monospace; font-size: 0.9rem; cursor: pointer; transition: opacity 0.2s; letter-spacing: 0.5px; }
    .btn:hover { opacity: 0.85; }
    .btn-primary { background: #238636; color: #fff; }
    .btn-secondary { background: #1f6feb; color: #fff; margin-left: 10px; }
    .error-msg { color: #f85149; font-size: 0.85rem; margin-top: -10px; margin-bottom: 12px; }
    .results-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; margin-top: 20px; }
    .result-box { background: #0d1117; border: 1px solid #30363d; border-radius: 8px; padding: 16px; }
    .result-box h3 { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
    .result-box .count { font-size: 1.2rem; font-weight: bold; }
    .result-box .meta { margin-top: 6px; font-size: 0.82rem; color: #8b949e; }
    .result-box .indices { margin-top: 8px; font-size: 0.78rem; color: #ffa657; word-break: break-all; line-height: 1.6; }
    .naive-col { color: #f85149; }
    .kmp-col   { color: #3fb950; }
    .rk-col    { color: #ffa657; }
    .text-display { margin-top: 14px; font-size: 0.82rem; color: #8b949e; line-height: 1.8; word-break: break-all; }
    .text-display .hl { background: #ffa657; color: #0d1117; border-radius: 2px; padding: 0 2px; font-weight: bold; }
    table { width: 100%; border-collapse: collapse; font-size: 0.85rem; margin-top: 16px; }
    th { text-align: right; padding: 8px 12px; background: #0d1117; color: #8b949e; font-size: 0.75rem; text-transform: uppercase; border-bottom: 1px solid #30363d; }
    th:first-child { text-align: left; }
    td { text-align: right; padding: 10px 12px; border-bottom: 1px solid #21262d; }
    td:first-child { text-align: left; color: #58a6ff; }
    tr:last-child td { border-bottom: none; }
    .legend { display: flex; gap: 20px; margin-bottom: 14px; font-size: 0.78rem; flex-wrap: wrap; }
    .legend span { display: flex; align-items: center; gap: 6px; }
    .dot { width: 10px; height: 10px; border-radius: 50%; }
    .dot-naive { background: #f85149; }
    .dot-kmp   { background: #3fb950; }
    .dot-rk    { background: #ffa657; }
    .loading { text-align: center; padding: 20px; color: #8b949e; font-size: 0.85rem; }
    .loading::after { content: ''; animation: dots 1.2s infinite; }
    @keyframes dots { 0%{content:'.'} 33%{content:'..'} 66%{content:'...'} }
    #perf-section { display: none; }
    @media (max-width: 560px) { .results-grid { grid-template-columns: 1fr; } .btn-secondary { margin-left: 0; margin-top: 10px; } }
  </style>
</head>
<body>

<header>
  <h1>String Matching Lab</h1>
  <p>Lab Experiment 2 — Naive vs KMP vs Rabin-Karp</p>
  <span class="badge">Naive &nbsp;·&nbsp; KMP &nbsp;·&nbsp; Rabin-Karp</span>
</header>

<div class="card">
  <h2>▶ Run String Match</h2>
  <label>Text</label>
  <input type="text" id="textInput" placeholder="e.g. AABAACAADAABAABA" />
  <label>Pattern</label>
  <input type="text" id="patternInput" placeholder="e.g. AABA" />
  <div id="errorMsg" class="error-msg" style="display:none;"></div>
  <button class="btn btn-primary" onclick="runMatch()">Search</button>
  <button class="btn btn-secondary" onclick="runPerf()">Run Performance Analysis</button>
</div>

<div class="card" id="resultsCard" style="display:none;">
  <h2>◎ Match Results</h2>
  <div id="textDisplay" class="text-display"></div>
  <div class="results-grid" id="resultsGrid"></div>
</div>

<div class="card" id="perf-section">
  <h2>⚡ Performance Analysis</h2>
  <p style="font-size:0.8rem;color:#8b949e;margin-bottom:14px;">Comparisons over a random 10,000-character text.</p>
  <div class="legend">
    <span><span class="dot dot-naive"></span> Naive</span>
    <span><span class="dot dot-kmp"></span> KMP</span>
    <span><span class="dot dot-rk"></span> Rabin-Karp</span>
  </div>
  <div id="perfContent"></div>
</div>

<script>
  async function runMatch() {
    const text    = document.getElementById("textInput").value.trim();
    const pattern = document.getElementById("patternInput").value.trim();
    const errDiv  = document.getElementById("errorMsg");
    errDiv.style.display = "none";
    if (!text || !pattern) { errDiv.textContent = "Both fields are required."; errDiv.style.display = "block"; return; }
    const res  = await fetch("/search", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ text, pattern }) });
    const data = await res.json();
    if (data.error) { errDiv.textContent = data.error; errDiv.style.display = "block"; return; }
    const matches = data.naive.matches;
    const m = pattern.length;
    let highlighted = "", i = 0;
    const matchSet = new Set(matches);
    while (i < text.length) {
      if (matchSet.has(i)) { highlighted += `<span class="hl">${text.slice(i, i + m)}</span>`; i += m; }
      else highlighted += text[i++];
    }
    document.getElementById("textDisplay").innerHTML = `<strong style="color:#8b949e;font-size:0.75rem;">TEXT (matches highlighted):</strong><br><br>${highlighted}`;
    function box(label, cls, res) {
      return `<div class="result-box"><h3 class="${cls}">${label}</h3><div class="count ${cls}">${res.matches.length} match${res.matches.length !== 1 ? "es" : ""}</div><div class="meta">Comparisons: <strong>${res.comparisons}</strong></div><div class="indices">Indices: ${res.matches.length ? res.matches.join(", ") : "—"}</div></div>`;
    }
    document.getElementById("resultsGrid").innerHTML = box("Naive Search","naive-col",data.naive) + box("KMP","kmp-col",data.kmp) + box("Rabin-Karp","rk-col",data.rabin);
    document.getElementById("resultsCard").style.display = "block";
  }

  async function runPerf() {
    const section = document.getElementById("perf-section");
    const content = document.getElementById("perfContent");
    section.style.display = "block";
    content.innerHTML = '<div class="loading">Running analysis</div>';
    const res  = await fetch("/performance", { method: "POST" });
    const data = await res.json();
    const rows = data.map(r => `<tr><td>${r.pattern}</td><td class="naive-col">${r.naive.toLocaleString()}</td><td class="kmp-col">${r.kmp.toLocaleString()}</td><td class="rk-col">${r.rk.toLocaleString()}</td></tr>`).join("");
    content.innerHTML = `<table><thead><tr><th>Pattern</th><th>Naive</th><th>KMP</th><th>Rabin-Karp</th></tr></thead><tbody>${rows}</tbody></table>`;
    section.scrollIntoView({ behavior: "smooth" });
  }

  document.addEventListener("keydown", e => { if (e.key === "Enter") runMatch(); });
</script>
</body>
</html>
