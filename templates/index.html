<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Search Algorithm Lab</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Courier New', monospace;
      background: #0d1117;
      color: #c9d1d9;
      min-height: 100vh;
      padding: 40px 20px;
    }

    header {
      text-align: center;
      margin-bottom: 48px;
    }

    header h1 {
      font-size: 2.2rem;
      color: #58a6ff;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    header p {
      margin-top: 8px;
      color: #8b949e;
      font-size: 0.9rem;
    }

    .badge {
      display: inline-block;
      margin-top: 12px;
      padding: 4px 12px;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 20px;
      font-size: 0.75rem;
      color: #3fb950;
    }

    .card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 10px;
      padding: 28px;
      max-width: 760px;
      margin: 0 auto 28px auto;
    }

    .card h2 {
      font-size: 1rem;
      color: #58a6ff;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 20px;
      border-bottom: 1px solid #21262d;
      padding-bottom: 10px;
    }

    label {
      display: block;
      font-size: 0.8rem;
      color: #8b949e;
      margin-bottom: 6px;
      letter-spacing: 0.5px;
    }

    input[type="text"] {
      width: 100%;
      padding: 10px 14px;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 6px;
      color: #c9d1d9;
      font-family: 'Courier New', monospace;
      font-size: 0.95rem;
      margin-bottom: 16px;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="text"]:focus {
      border-color: #58a6ff;
    }

    .btn {
      display: inline-block;
      padding: 10px 24px;
      border-radius: 6px;
      border: none;
      font-family: 'Courier New', monospace;
      font-size: 0.9rem;
      cursor: pointer;
      transition: opacity 0.2s;
      letter-spacing: 0.5px;
    }

    .btn:hover { opacity: 0.85; }

    .btn-primary { background: #238636; color: #fff; }
    .btn-secondary { background: #1f6feb; color: #fff; margin-left: 10px; }

    .error-msg {
      color: #f85149;
      font-size: 0.85rem;
      margin-top: -10px;
      margin-bottom: 12px;
    }

    .results-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-top: 20px;
    }

    .result-box {
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 18px;
    }

    .result-box h3 {
      font-size: 0.75rem;
      color: #8b949e;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 10px;
    }

    .result-box .found {
      color: #3fb950;
      font-size: 1.1rem;
      font-weight: bold;
    }

    .result-box .not-found {
      color: #f85149;
      font-size: 1.1rem;
      font-weight: bold;
    }

    .result-box .meta {
      margin-top: 6px;
      font-size: 0.85rem;
      color: #8b949e;
    }

    .array-display {
      margin-top: 14px;
      font-size: 0.8rem;
      color: #8b949e;
      word-break: break-all;
      line-height: 1.6;
    }

    .array-display span.highlight {
      color: #ffa657;
      font-weight: bold;
    }

    /* Performance Table */
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.85rem;
      margin-top: 16px;
    }

    th {
      text-align: right;
      padding: 8px 12px;
      background: #0d1117;
      color: #8b949e;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      border-bottom: 1px solid #30363d;
    }

    th:first-child { text-align: left; }

    td {
      text-align: right;
      padding: 10px 12px;
      border-bottom: 1px solid #21262d;
      color: #c9d1d9;
    }

    td:first-child { text-align: left; color: #58a6ff; }

    tr:last-child td { border-bottom: none; }

    .is-col { color: #3fb950; }
    .bs-col { color: #ffa657; }

    .legend {
      display: flex;
      gap: 20px;
      margin-bottom: 14px;
      font-size: 0.78rem;
    }

    .legend span { display: flex; align-items: center; gap: 6px; }
    .dot { width: 10px; height: 10px; border-radius: 50%; }
    .dot-is { background: #3fb950; }
    .dot-bs { background: #ffa657; }

    .loading {
      text-align: center;
      padding: 20px;
      color: #8b949e;
      font-size: 0.85rem;
    }

    .loading::after {
      content: '';
      animation: dots 1.2s infinite;
    }

    @keyframes dots {
      0%   { content: '.'; }
      33%  { content: '..'; }
      66%  { content: '...'; }
    }

    #perf-section { display: none; }

    @media (max-width: 500px) {
      .results-grid { grid-template-columns: 1fr; }
      .btn-secondary { margin-left: 0; margin-top: 10px; }
    }
  </style>
</head>
<body>

<header>
  <h1>Search Algorithm Lab</h1>
  <p>Lab Experiment 1 — Algorithm Analysis</p>
  <span class="badge">Interpolation Search &nbsp;·&nbsp; Binary Search</span>
</header>

<!-- Search Card -->
<div class="card">
  <h2>▶ Run Search</h2>

  <label>Sorted Array (comma-separated integers)</label>
  <input type="text" id="arrayInput" placeholder="e.g. 2, 5, 10, 15, 23, 42, 58" />

  <label>Target Value</label>
  <input type="text" id="targetInput" placeholder="e.g. 15" />

  <div id="errorMsg" class="error-msg" style="display:none;"></div>

  <button class="btn btn-primary" onclick="runSearch()">Search</button>
  <button class="btn btn-secondary" onclick="runPerformance()">Run Performance Analysis</button>
</div>

<!-- Search Results -->
<div class="card" id="resultsCard" style="display:none;">
  <h2>◎ Search Results</h2>
  <div id="arrayDisplay" class="array-display"></div>
  <div class="results-grid" id="resultsGrid"></div>
</div>

<!-- Performance Results -->
<div class="card" id="perf-section">
  <h2>⚡ Performance Analysis</h2>
  <p style="font-size:0.8rem;color:#8b949e;margin-bottom:14px;">Average time over 100 runs per array size.</p>
  <div class="legend">
    <span><span class="dot dot-is"></span> Interpolation Search</span>
    <span><span class="dot dot-bs"></span> Binary Search</span>
  </div>
  <div id="perfContent"></div>
</div>

<script>
  async function runSearch() {
    const arrayVal = document.getElementById("arrayInput").value.trim();
    const targetVal = document.getElementById("targetInput").value.trim();
    const errDiv = document.getElementById("errorMsg");

    errDiv.style.display = "none";

    if (!arrayVal || !targetVal) {
      errDiv.textContent = "Both fields are required.";
      errDiv.style.display = "block";
      return;
    }

    const res = await fetch("/search", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ array: arrayVal, target: targetVal })
    });

    const data = await res.json();

    if (data.error) {
      errDiv.textContent = data.error;
      errDiv.style.display = "block";
      return;
    }

    // Render array with target highlighted
    const arr = data.array;
    const target = data.target;
    const highlighted = arr.map((v, i) =>
      v === target
        ? `<span class="highlight">[${v}]</span>`
        : v
    ).join(", ");

    document.getElementById("arrayDisplay").innerHTML =
      `<strong style="color:#8b949e;font-size:0.75rem;">SORTED ARRAY:</strong><br>${highlighted}`;

    function resultHTML(label, res) {
      const found = res.index !== -1;
      return `
        <div class="result-box">
          <h3>${label}</h3>
          <div class="${found ? 'found' : 'not-found'}">
            ${found ? `Found at index ${res.index}` : 'Not Found'}
          </div>
          <div class="meta">Comparisons: <strong>${res.comparisons}</strong></div>
        </div>`;
    }

    document.getElementById("resultsGrid").innerHTML =
      resultHTML("Interpolation Search", data.interpolation) +
      resultHTML("Binary Search", data.binary);

    document.getElementById("resultsCard").style.display = "block";
  }

  async function runPerformance() {
    const section = document.getElementById("perf-section");
    const content = document.getElementById("perfContent");
    section.style.display = "block";
    content.innerHTML = '<div class="loading">Running analysis</div>';

    const res = await fetch("/performance", { method: "POST" });
    const data = await res.json();

    let rows = data.map(r => `
      <tr>
        <td>${r.size.toLocaleString()}</td>
        <td class="is-col">${r.is_time}</td>
        <td class="bs-col">${r.bs_time}</td>
        <td class="is-col">${r.is_comparisons}</td>
        <td class="bs-col">${r.bs_comparisons}</td>
      </tr>`).join("");

    content.innerHTML = `
      <table>
        <thead>
          <tr>
            <th>Array Size</th>
            <th>IS Time (ms)</th>
            <th>BS Time (ms)</th>
            <th>IS Comparisons</th>
            <th>BS Comparisons</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>`;

    section.scrollIntoView({ behavior: "smooth" });
  }

  // Allow Enter key to trigger search
  document.addEventListener("keydown", e => {
    if (e.key === "Enter") runSearch();
  });
</script>
</body>
</html>
